<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="instruction-manual"
        content="Homework Machinery serves as a refuge against depression, a haven for daydreams, and a tool for my code learning" />
    <title>Homework Machinery</title>
    <style>
       * {
    font-family: 'Times New Roman', Times, serif;

}

.header {
    text-align: center;
    margin-bottom: 8px;
}

.green {
    font-size: 6vw;
    color: green;
    text-decoration: underline;
    text-decoration-thickness: 0.45vw;
}

.purpleline {
    background-color: rgb(150, 0, 198);
    /* background-color:red; */
    height: 0.1vw;
    border: none;
    margin-top: 1px;
}

.greenline {
    background-color: green;
    height: 0.1vw;
    border: none;
}

.instruction {
    font-size: 3.3vw;
    color: green;
    text-decoration: underline;
    text-align: center;
    text-decoration-thickness: 0.25vw;
    /* line-height:4vw; */

}

.green:hover {
    color: red;
}
       
       body {
            background-color: black;
        }

        .center {
            width: 1000px;
            margin: 0 auto;
        }

        .square {
            background: linear-gradient(to top, rgba(0, 128, 0, .8) 40%, rgba(0, 0, 0, 0)100%);
            width: 16vw;
            height: 16vw;
            /* transition: all 0.2s linear; */
        }

        .square:hover {
            box-shadow: 0px 0px 100px 5px green;
        }


        .circle {
            width: 16vw;
            height: 16vw;
            background-color: black;
            border-radius: 50%;
            box-shadow: 0px 0px 50px 40px green;
            margin-top: 8vw;
            margin-bottom: 5vw;
            /* transition: all 0.2s linear; */
            animation: light 4s ease-in-out infinite;
        }

        @keyframes light {
            from {
                box-shadow: 0px 0px 38px 28px green;
            }

            50% {
                box-shadow: 0px 0px 60px 40px green;
            }

            to {
                box-shadow: 0px 0px 38px 28px green;
            }
        }


        .circle:hover {
            box-shadow: 0px 0px 60px 50px green;
            /* animation-play-state: paused; */
        }

        .flatland {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }


        .triangle {
            transition: all 0.2s linear;
        }


        .triangle-svg:hover polygon {
            filter: url(#dropshadow);
        }

        .section {
            display: none;
            margin-left: 5px;
        }

        .homework {
            display: flex;
            flex-wrap: wrap;
        }

        .homework li {
            position: relative;
            width: 16vw;
            height: 16vw;
            display: flex;
            margin-right: 10px;
            cursor: pointer;
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* font-family: 'Times New Roman', "宋体", "Microsoft YaHei", "黑体", ; */
            display: flex;
            align-items: center;
            justify-content: left;
            opacity: 0;
            /* transition: opacity 0.3s ease, visibility 0.3s ease; */
            /* border: 2px solid green;  */
            /* text-shadow: 4px 4px 4px rgba(0, 128, 0, 0.5); */
            filter: blur(0px);
        }

        .overlay .title {
            font-size: 5vw;
            line-height: 4vw;
            /* background-color: green ; */
            color: green;
            bottom: 0px;
            position: absolute;
            /* font-weight: bolder; */
            text-decoration: underline;
        }

        .homework li:hover .overlay {
            opacity: 1;
            /* border: 4px solid green;  */
        }

        .date {
            font-size: 30px;
            position: absolute;
            right: 0;
            bottom: -30px;
            margin-right: 3px;
            color: green;

        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }


        .modal-half {
            flex: 1;
            padding: 0px 20px 20px 20px;
        }

        .modal-left {
            padding: 30px;
        }

        .modal-right {
            color: white;
        }


        .modal-content {
            background-color: rgb(0, 0, 0);
            margin: 15% auto;
            border: 1px solid #888;
            width: 80%;
            display: flex;
        }

        .modal-title {
            color: green;
            /* text-decoration: underline; */
        }

        .modal-link {
            color: green;
            font-size: 30px;
        }


        .modal-video {
            width: 100%;
            height: auto;
            max-width: 640px;
            min-width: 300px;
        }

        .modal-image {
            max-width: 640px;
            min-width: 300px;
            width: 100%;
            height: auto;
        }

        .modal-textA {
            /* font-family: 'Monaco'; */
            line-height: 11px;
        }

        .close-modal {
            cursor: pointer;
            text-decoration: underline;
        }

        .close-modal:hover {
            /* color: green;
             */
        }

        .flatland-mini {
            cursor: pointer;

        }

        .square-mini {
            position: fixed;
            width: 40px;
            height: 40px;
            /* background: linear-gradient(to top, rgba(0, 128, 0, .8) 40%, rgba(0, 0, 0, 0) 100%); */
            bottom: 130px;
            right: 25px;
            background-color: green;
            box-sizing: border-box;
        }

        .circle-mini {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: green;
            /* box-shadow: 0px 0px 15px 8px green; */
            bottom: 75px;
            right: 25px;
            box-sizing: border-box;

        }


        .triangle-mini {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid green;
        }

        .triangle-mini::after {
            content: '';
            position: absolute;
            bottom: 7px;
            right: -13.5px;
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 25px solid green;
        }

        .textB-desc {
            display: flex;
            justify-content: left;

        }

        .textB-desc img {
            margin-right: 10px;
        }

        .bold {
            font-weight: bold;
        }

        .underline {
            text-decoration: underline;
        }

        .hover-effect {
            background-color: black;
            border: 3px solid green;
        }

        .triangle-hover-effect:after {
            border-top: 25px solid black;
        }
    </style>
</head>


<body>
    <div class="header"> <a id="headerLink" class="green" href="#">~((((((CLICK HERE TO ENTER MY HOMEWORK
            MACHINERY))))))~</a></div>
    <hr class="purpleline">
    <div class="instruction"> &lt;meta name="instruction-manual" content="Homework Machinery serves as a refuge against
        depression, a haven for daydreams, and a tool for my code learning" /&gt; </div>
    <hr class="greenline">


    <div class="flatland ">
        <a href="./homework.html" target="_parent">
            <div class="square "></div>
        </a>
        <a href="#">
            <div class="circle"></div>
        </a>

        <a class="triangle" href="https://www.instagram.com/savebuzhang/" target="_blank"
            style="display: block; width: 16vw; height: 13.5vw;">
            <svg class="triangle-svg" viewBox="0 0 100 100" preserveAspectRatio="none" style="overflow: visible;">
                <defs>
                    <linearGradient id="gradient1" x1="50%" y1="0%" x2="50%" y2="100%">
                        <stop offset="0%" style="stop-color:rgb(0, 128, 0);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:rgb(0, 0, 0);stop-opacity:1" />
                    </linearGradient>
                    <filter id="dropshadow" x="-100%" y="-100%" width="300%" height="300%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="35" /> <!-- 调整这里以改变模糊度 -->
                        <feOffset dx="0" dy="0" result="offsetblur" /> <!-- 没有偏移 -->
                        <feFlood flood-color="green" result="color" /> <!-- 绿色阴影 -->
                        <feComposite in="color" in2="offsetblur" operator="in" result="shadow" />
                        <feMerge>
                            <feMergeNode in="shadow" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
                <polygon points="50,100 100,15 0,15" fill="url(#gradient1)" />
            </svg>
        </a>
    </div>


    <div class="section center">
        <ul class="homework">

            <li data-id="1">
                <div class="overlay">
                    <span class="title">)泪目(<br>endless<br> tears</span>
                    <span class="date">
                    </span>
                </div>

                <video autoplay loop muted>
                    <source src="./endless-tears/1.mp4" type="video/mp4">
                </video>
            </li>
        </ul>
    </div>


    <div class="modal">
        <div class="modal-content">
            <div class="modal-half modal-left"></div>
            <div class="modal-half modal-right">
            </div>
        </div>
        <div class="flatland-mini">
            <div class="square-mini"></div>
            <div class="circle-mini"></div>
            <div class="triangle-mini">
                <!-- <img src="./泪目/1.svg" width='40px'
               height= '32px'> -->
            </div>
        </div>
    </div>



</body>
<script src="./modalContent.js"></script>
<script>
    var oFlatland = document.querySelector('.flatland');
    var oSection = document.querySelector('.section');
    var oCircle = document.querySelector('.circle');
    var oHead = document.getElementById('headerLink');
    var aLi = document.querySelectorAll('.homework li');
    var toggle = true;
    var oOverlay = document.querySelector('.overlay');
    var oModal = document.querySelector('.modal');
    var modalLeft = document.querySelector('.modal-left');
    var modalRight = document.querySelector('.modal-right');
    var squareMini = document.querySelector('.square-mini');
    var circleMini = document.querySelector('.circle-mini');
    var triangleMini = document.querySelector('.triangle-mini');
    var flatlandMini = document.querySelector('.flatland-mini');

    oHead.addEventListener('click', function () {
        if (toggle) {
            oFlatland.style.display = 'none';
            oSection.style.display = 'flex';
            toggle = false;
        } else {
            oFlatland.style.display = 'flex';
            oSection.style.display = 'none';
            toggle = true;
        }
    });

    oCircle.addEventListener('click', function () {
        oFlatland.style.display = 'none';
        oSection.style.display = 'flex';
        toggle = false;
    }
    );

    aLi.forEach(function (li) {
        li.addEventListener('mouseover', function () {
            li.style.border = "4px green solid";
            oOverlay.style.opacity = '1';
            //     aDate.forEach(function (date) {
            //     date.style.display = 'none';
            // });
        }
        );
        li.addEventListener('mouseout', function () {
            li.style.border = "none";
            oOverlay.style.opacity = '0';
        }
        );
    });


    aLi.forEach(item => {
        item.addEventListener('click', function () {
            var id = this.getAttribute('data-id');
            var content = modalContent.find(c => c.id.toString() === id);
            modalLeft.innerHTML = `
            <video  autoplay loop class="modal-video">
                <source src="${content.videoAa}" type="video/mp4" >
            </video>
            <video controls loop class="modal-video">
                <source src="${content.videoAb}" type="video/mp4" >
            </video>
            <img src="${content.imageA}" >`;
            modalRight.innerHTML = `
    <h1 class="modal-title">${content.title}</h1>
    <p class="modal-textA">${content.textA.replace(/\n/g, '<br>')}</p> 
    <a class="modal-link" href='${content.href}' target="_blank">${content.link}</a>`;
            squareMini.addEventListener('mouseenter', function () {
                if (content) {
                    modalLeft.innerHTML = `
            <video  autoplay loop class="modal-video">
                <source src="${content.videoAa}" type="video/mp4" >
            </video>
            <video controls loop class="modal-video">
                <source src="${content.videoAb}" type="video/mp4" >
            </video>
            <img src="${content.imageA}" >`;
                    modalRight.innerHTML = `
    <h1 class="modal-title">${content.title}</h1>
    <p class="modal-textA">${content.textA.replace(/\n/g, '<br>')}</p> 
    <a class="modal-link" href='${content.href}' target="_blank">${content.link}</a>`;
                }
            }

            );

            circleMini.addEventListener('mouseenter', function () {
                if (content) {
                    modalLeft.innerHTML = `
            <img class='modal-image' src="${content.imageB}" >`;
                    modalRight.innerHTML = `
    <h1 class="modal-title">${content.title}</h1>
    <div class="modal-textB">${content.textB.replace(/\n/g, '<br>')}</div> 
    <a class="modal-link" href='${content.href}' target="_blank">${content.link}</a>`;
                }
            }
            );

            triangleMini.addEventListener('mouseenter', function () {
                if (content) {
                    modalLeft.innerHTML = `
            <video  controls loop class="modal-video">
                <source src="${content.videoC}" type="video/mp4" >
            </video>`
                    modalRight.innerHTML = `
    <h1 class="modal-title">${content.title}</h1>
    <div class="modal-textB">${content.textC.replace(/\n/g, '<br>')}</div> 
    <a class="modal-link" href='${content.href}' target="_blank">${content.link}</a>`;
                }
            }
            );
            oModal.style.display = 'block';
            squareMini.classList.add('hover-effect');
        });
    });





  
        var miniIcons = document.querySelectorAll('.flatland-mini div');

        miniIcons.forEach(function (icon) {
            icon.addEventListener('mouseenter', function () {
                miniIcons.forEach(el => el.classList.remove('hover-effect', 'triangle-hover-effect'));
                if (this === triangleMini) {
                    this.classList.add('triangle-hover-effect');
                } else {
                    this.classList.add('hover-effect');
                }
            });
        });




        var closeModal = document.querySelector('.close-modal');
        document.addEventListener('click', function(event) {
            if (event.target === oModal || event.target.classList.contains('close-modal')) {
                oModal.style.display = 'none';
            }
        });



</script>

</html>
